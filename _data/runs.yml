        description: "Wafers returned from GlobalFoundries fabrication"
        status: "milestone"
      - title: "Bare Dies Shipped"
        date: "2026-04-28"
        display_date: "28 April 2026"
        description: "Bare dies shipped to customers"
        status: "delivery"
      - title: "Packaged Parts Shipped"
        date: "2026-05-12"
        display_date: "12 May 2026"
        description: "Chip-on-board packaged parts shipped"
        status: "delivery"

